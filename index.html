<div id="ebr-calculator">
  <meta name="robots" content="noindex, nofollow">
  
  <!-- Chargement des SDKs -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    #ebr-calculator { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 500px; margin: auto; color: #333; }
    #ebr-calculator label { font-weight: bold; display: block; margin-top: 15px; font-size: 0.9em; }
    #ebr-calculator input, #ebr-calculator select { width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
    
    /* Boutons */
    #ebr-calculator .btn-main { margin-top: 25px; width: 100%; padding: 14px; background: #FF6600; font-size: 16px; font-weight: bold; color: #ffffff; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; }
    #ebr-calculator .btn-main:hover { background: #e65c00; }
    #ebr-calculator .btn-main:disabled { background: #ccc; cursor: not-allowed; }
    #ebr-calculator .btn-logout { background: transparent; color: #666; border: 1px solid #ccc; padding: 5px 10px; font-size: 12px; cursor: pointer; float: right; border-radius: 4px; }
    #ebr-calculator .btn-forgot { display: block; margin-top: 15px; font-size: 13px; color: #666; text-decoration: underline; background: none; border: none; cursor: pointer; }
    #ebr-calculator .btn-forgot:hover { color: #FF6600; }

    /* Login Screen */
    #ebr-auth-screen { background: #f4f4f4; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
    #ebr-auth-screen h2 { color: #FF6600; margin-top: 0; }
    .auth-error { color: #d32f2f; font-size: 14px; margin-top: 10px; display: none; }

    /* Main Content */
    #ebr-main-content { display: none; background: white; padding: 20px; border-radius: 10px; }
    
    /* Resultat unique (Reprise) */
    .ebr-results-container { margin-top: 25px; }
    .ebr-price-box { padding: 20px; border: 2px solid #FF6600; border-radius: 10px; text-align: center; background: #fff5ee; }
    .ebr-price-box span { display: block; font-size: 0.9em; color: #FF6600; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
    .ebr-price-box div { font-size: 2.2em; font-weight: bold; color: #000; }
    
    #ebr-sample-info { margin-top: 12px; text-align: center; font-size: 0.85em; color: #888; font-style: italic; }
    #ebr-error { margin-top: 15px; color: #d32f2f; display: none; text-align: center; font-weight: bold; }
    
    #ebr-search-btn { background: #f0f0f0; border: 1px solid #ccc; color: #333; margin-top: 10px; font-size: 13px; padding: 8px; width: 100%; border-radius: 4px; cursor: pointer; }
    
    .ebr-tva-container { background: #f9f9f9; padding: 12px; border-radius: 6px; border: 1px solid #eee; margin-top: 20px; }
    .ebr-tva-option { display: flex !important; align-items: center; cursor: pointer; font-weight: normal !important; margin-top: 8px !important; }
    .ebr-tva-option input { width: auto !important; margin: 0 10px 0 0 !important; }
  </style>

  <!-- SCREEN 1: LOGIN -->
  <div id="ebr-auth-screen">
    <h2>🚲 Accès Partenaire</h2>
    <p>Connectez-vous pour accéder à l'estimateur</p>
    <input type="email" id="auth-email" placeholder="Votre email professionnel">
    <input type="password" id="auth-password" placeholder="Mot de passe">
    <button class="btn-main" id="btn-login">Se connecter</button>
    <button class="btn-forgot" id="btn-forgot">Mot de passe oublié ?</button>
    <p class="auth-error" id="auth-error-msg">Email ou mot de passe incorrect</p>
  </div>

  <!-- SCREEN 2: CALCULATEUR -->
  <div id="ebr-main-content">
    <button class="btn-logout" id="btn-logout">Déconnexion</button>
    <div style="clear:both;"></div>
    
    <form id="ebr-form">
      <label>Type de Vélo *</label>
      <select id="ebr-type" required>
        <option value="">Sélectionner</option>
        <option value="VTTAE">VTTAE</option>
        <option value="SUV/VTC/Ville">SUV/VTC/Ville</option>
        <option value="VTTAE Light">VTTAE Light</option>
      </select>

      <label>Marque du vélo *</label>
      <select id="ebr-marque" required>
        <option value="">Sélectionner</option>
        <option>Bergamont</option><option>BH</option><option>Bulls</option><option>Cannondale</option><option>Canyon</option><option>Cube</option><option>Decathlon</option><option>Focus</option><option>Ghost</option><option>Giant</option><option>Haibike</option><option>KTM</option><option>Lapierre</option><option>Liv</option><option>Mondraker</option><option>Moustache</option><option>Orbea</option><option>Raymon</option><option>Santa Cruz</option><option>Scott</option><option>Sunn</option><option>Trek</option>
      </select>

      <label>Modèle *</label>
      <input type="text" id="ebr-modele" placeholder="ex: Moustache Game 6" required />

      <label>Année *</label>
      <select id="ebr-yearSelect" required>
        <option value="">Sélectionner</option>
      </select>

      <button type="button" id="ebr-search-btn">🔍 Vérifier le prix neuf sur Google</button>

      <label>Prix d'origine (€) *</label>
      <input type="number" id="ebr-prix" placeholder="Prix public TTC" required />

      <label>Kilométrage *</label>
      <input type="number" id="ebr-km" placeholder="Distance totale" required />

      <label>Motorisation *</label>
      <select id="ebr-moteur" required>
        <option value="">Sélectionner</option>
        <option>Bosch</option><option>Yamaha</option><option>Shimano</option>
      </select>

      <label>Capacité batterie (Wh) *</label>
      <input type="number" id="ebr-batterie" placeholder="ex: 625" required />

      <div class="ebr-tva-container">
        <label>Régime de TVA *</label>
        <label class="ebr-tva-option">
          <input type="radio" name="tva" value="marge" checked> Achat en TVA sur Marge
        </label>
        <label class="ebr-tva-option">
          <input type="radio" name="tva" value="classique"> Achat en TVA Classique (HT)
        </label>
      </div>
      
      <button type="submit" class="btn-main" id="ebr-submit-btn">Calculer la reprise</button>
    </form>

    <div class="ebr-results-container">
      <div class="ebr-price-box">
        <span>Estimation de Reprise</span>
        <div id="res-reprise">-- €</div>
      </div>
    </div>

    <div id="ebr-sample-info" style="display:none;">
      Basé sur <span id="res-count">0</span> vélos similaires.
    </div>

    <div id="ebr-error">❌ Erreur de calcul. Veuillez vérifier les champs.</div>
  </div>

  <script>
    (function () {
      // CONFIGURATION SUPABASE
      const SUPABASE_URL = "https://tjcswndqjussqkhdapsl.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqY3N3bmRxanVzc3FraGRhcHNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDc3NDMsImV4cCI6MjA5MzU4Mzc0M30.VqlLGNaXKR71rUFE66Yww7c_-tg9MDl0bxiB-7PMQKg"; // <--- REMPLACER PAR TA ANON KEY
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const PYTHON_API_URL = "https://ebikereborn-ebikereborn-pricing.hf.space/estimate";
      const HASH_KEY = "28406f3871e106b1bb54c647618c087e839b8564d0856ed822f6461fd29de4f2";

      // Elements UI
      const authScreen = document.getElementById("ebr-auth-screen");
      const mainContent = document.getElementById("ebr-main-content");
      const authErrorMsg = document.getElementById("auth-error-msg");
      const yearSelect = document.getElementById("ebr-yearSelect");
      const resReprise = document.getElementById("res-reprise");
      const resCount = document.getElementById("res-count");
      const sampleInfo = document.getElementById("ebr-sample-info");

      // 1. GESTION AUTHENTIFICATION
      async function checkSession() {
          const { data: { session } } = await _supabase.auth.getSession();
          if (session) {
              authScreen.style.display = "none";
              mainContent.style.display = "block";
          }
      }
      checkSession();

      document.getElementById("btn-login").addEventListener("click", async () => {
          const email = document.getElementById("auth-email").value;
          const password = document.getElementById("auth-password").value;
          const { error } = await _supabase.auth.signInWithPassword({ email, password });
          
          if (error) {
              authErrorMsg.style.display = "block";
              authErrorMsg.innerText = "Erreur : " + error.message;
          } else {
              location.reload();
          }
      });

      document.getElementById("btn-logout").addEventListener("click", async () => {
          await _supabase.auth.signOut();
          location.reload();
      });
      
      // GESTION DU MOT DE PASSE OUBLIÉ
document.getElementById("btn-forgot").addEventListener("click", async () => {
    const email = document.getElementById("auth-email").value;
    
    if (!email) {
        alert("Veuillez saisir votre adresse email pour recevoir le lien de réinitialisation.");
        return;
    }

    const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.href, // Redirige l'utilisateur sur cette même page
    });

    if (error) {
        authErrorMsg.style.display = "block";
        authErrorMsg.innerText = "Erreur : " + error.message;
    } else {
        alert("Un email de réinitialisation a été envoyé à : " + email);
    }
});
      // 2. LOGIQUE CALCULATEUR
      const currentYear = new Date().getFullYear();
      for (let y = currentYear; y >= 2016; y--) {
        const opt = document.createElement("option");
        opt.value = y; opt.textContent = y;
        yearSelect.appendChild(opt);
      }

      document.getElementById("ebr-search-btn").addEventListener("click", function() {
        const marque = document.getElementById("ebr-marque").value;
        const modele = document.getElementById("ebr-modele").value;
        if (!marque || !modele) { alert("Saisissez la marque et le modèle."); return; }
        const query = encodeURIComponent(`prix neuf vélo électrique ${marque} ${modele}`);
        window.open(`https://www.google.com/search?q=${query}`, '_blank');
      });

      document.getElementById("ebr-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        
        const btn = document.getElementById("ebr-submit-btn");
        const errorBox = document.getElementById("ebr-error");
        
        errorBox.style.display = "none";
        sampleInfo.style.display = "none";
        btn.disabled = true;
        btn.textContent = "Calcul en cours...";
        resReprise.textContent = "⏳";

        const tvaType = document.querySelector('input[name="tva"]:checked').value;

        const payload = {
          access_token: HASH_KEY,
          TypeVelo: document.getElementById("ebr-type").value,
          Marque: document.getElementById("ebr-marque").value,
          Modele: document.getElementById("ebr-modele").value,
          PrixOrigine: document.getElementById("ebr-prix").value,
          Annee: document.getElementById("ebr-yearSelect").value,
          Kilometrage: document.getElementById("ebr-km").value,
          Motorisation: document.getElementById("ebr-moteur").value,
          CapaciteBatterie: document.getElementById("ebr-batterie").value
        };

        try {
          const response = await fetch(PYTHON_API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          const result = await response.json();

          if (result && !result.error) {
            let price = result.reprise;
            let label = "TTC";
            
            if (tvaType === "classique") {
              price = Math.round(price * 0.833);
              label = "HT";
            }

            resReprise.textContent = price.toLocaleString() + " € " + label;
            resCount.textContent = result.count || result.n_samples || "0";
            sampleInfo.style.display = "block";
          } else {
            throw new Error();
          }
        } catch (err) {
          errorBox.style.display = "block";
          resReprise.textContent = "-- €";
        } finally {
          btn.disabled = false;
          btn.textContent = "Calculer la reprise";
        }
      });
    })();
  </script>
</div>
